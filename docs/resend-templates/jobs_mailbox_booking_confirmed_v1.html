<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New booking alert</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f0fdf4;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0fdf4;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width:600px;background:#ffffff;border-radius:12px;padding:36px 28px;border:1px solid #bbf7d0;">
            <tr>
              <td>
                <p style="margin:0 0 6px;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#15803d;">New booking</p>
                <p style="margin:0 0 20px;font-size:22px;font-weight:700;color:#14532d;">{{{booking_reference}}}</p>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:15px;color:#166534;margin-bottom:20px;">
                  <tr><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;"><strong>Customer</strong></td><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;text-align:right;">{{{customer_first_name}}}</td></tr>
                  <tr><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;"><strong>Pickup</strong></td><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;text-align:right;">{{{pickup_location}}}</td></tr>
                  <tr><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;"><strong>Dropoff</strong></td><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;text-align:right;">{{{dropoff_location}}}</td></tr>
                  <tr><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;"><strong>Time</strong></td><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;text-align:right;">{{{pickup_time}}}</td></tr>
                  <tr><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;"><strong>Vehicle</strong></td><td style="padding:8px 0;border-bottom:1px solid #ecfdf5;text-align:right;">{{{vehicle_class}}}</td></tr>
                  <tr><td style="padding:8px 0;"><strong>Paid</strong></td><td style="padding:8px 0;text-align:right;">{{{amount_paid}}} {{{currency}}}</td></tr>
                </table>
                <p style="margin:0;font-size:15px;">
                  <a href="{{{admin_booking_url}}}" style="display:inline-block;background:#15803d;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">Open in admin</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
